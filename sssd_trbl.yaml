---
- name: Troubleshoot sssd
  hosts: all
  gather_facts: true

  tasks:
    - name: Stop sssd
      ansible.builtin.service: 
        name: sssd
        state: stopped
        
    - name: Clear cache
      block:
        - name: Clear database cache
          ansible.builtin.shell: 
            cmd: rm -f /var/lib/sss/db/*

        - name: Clear logs
          ansible.builtin.shell: 
            cmd: rm -f /var/log/sssd/*
            
    - name: Start sssd
      ansible.builtin.service:
        name: sssd
        state: started
